  <rect x="389" y="254" width="85" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
  <text x="431" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806" font-weight="bold">Validation</text>
  <rect x="482" y="254" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="524" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <text x="628" y="276" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3a3530">89%</text>

  <!-- ROW 5 -->
  <text x="68" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a3530">Round 5</text>
  <rect x="110" y="312" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="152" y="334" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="203" y="312" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="245" y="334" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="296" y="312" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="338" y="334" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="389" y="312" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="431" y="334" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="482" y="312" width="85" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
  <text x="524" y="334" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806" font-weight="bold">Validation</text>
  <text x="628" y="334" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3a3530">93%</text>

  <!-- Divider + average -->
  <line x1="580" y1="370" x2="656" y2="370" stroke="#c5b8a0" stroke-width="1"/>
  <text x="510" y="393" text-anchor="end" font-size="13" font-weight="bold" fill="#3a3530">Average accuracy:</text>
  <text x="628" y="393" text-anchor="middle" font-size="14" font-weight="bold" fill="#0F6E56">88.8%</text>

  <!-- Legend -->
  <rect x="183" y="428" width="16" height="16" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="205" y="440" font-size="12" fill="#3a3530">Training</text>
  <rect x="310" y="428" width="16" height="16" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
  <text x="332" y="440" font-size="12" fill="#3a3530">Validation</text>

  <text x="340" y="470" text-anchor="middle" font-size="11.5" fill="#888780" font-style="italic">Each fold takes exactly one turn as the validation set</text>
</svg>
