  <text x="152" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="203" y="196" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="245" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="296" y="196" width="85" height="44" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
  <text x="338" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806" font-weight="bold">Validation</text>
  <rect x="389" y="196" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="431" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="482" y="196" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="524" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <text x="628" y="218" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3a3530">84%</text>

  <!-- ROW 4 -->
  <text x="68" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a3530">Round 4</text>
  <rect x="110" y="254" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="152" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="203" y="254" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="245" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Training</text>
  <rect x="296" y="254" width="85" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
