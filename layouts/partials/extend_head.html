<!-- Playfair Display for post titles -->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- MathJax -->
{{ if .Params.math }}
{{ partial "math.html" . }}
{{ end }}

<style>
    /* Back to TOC button */
    .back-to-toc {
        display: inline-block;
        font-size: 0.75em;
        color: var(--secondary);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        margin-left: 8px;
        vertical-align: middle;
        opacity: 0.6;
        transition: opacity 0.2s;
    }

    .back-to-toc:hover {
        opacity: 1;
        color: var(--primary);
    }

    /* Cormorant Garamond for post title only */
    .post-title {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 1000;
        font-size: 2.5em;
        line-height: 1.2;
        letter-spacing: 0.01em;
    }

    .post-description {
        font-style: italic;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Only run on post pages that have a TOC
        const toc = document.getElementById('toc');
        if (!toc) return;

        // Add back-to-toc link after every H2 and H3
        const headers = document.querySelectorAll('.post-content h2, .post-content h3');
        headers.forEach(function (header) {
            const link = document.createElement('a');
            link.href = '#toc';
            link.className = 'back-to-toc';
            link.title = 'ToC';
            link.innerHTML = '↑';
            header.appendChild(link);
        });
    });
</script>
