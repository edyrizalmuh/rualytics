<style>
    .floating-toc {
        position: fixed;
        top: 80px;
        right: 20px;
        width: 250px;
        max-height: 80vh;
        overflow-y: auto;
        background: var(--entry);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 0.85em;
        z-index: 100;
        display: none;
    }

    .floating-toc summary {
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 8px;
        color: var(--primary);
    }

    .floating-toc ul {
        list-style: none;
        padding-left: 12px;
        margin: 4px 0;
    }

    .floating-toc a {
        color: var(--secondary);
        text-decoration: none;
        display: block;
        padding: 2px 0;
        line-height: 1.4;
    }

    .floating-toc a:hover {
        color: var(--primary);
    }

    .floating-toc a.active {
        color: var(--primary);
        font-weight: bold;
    }

    /* Only show on wide screens */
    @media (min-width: 1400px) {
        .floating-toc {
            display: block;
        }
    }

    /* Scrollbar styling */
    .floating-toc::-webkit-scrollbar {
        width: 4px;
    }

    .floating-toc::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }
</style>
