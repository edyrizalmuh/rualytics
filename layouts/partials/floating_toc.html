{{- $headers := findRE "<h[1-6].*?>(.|\n])+?</h[1-6]>" .Content -}}
    {{- $has_headers := ge (len $headers) 3 -}}
    {{- if $has_headers -}}
    <div class="floating-toc" id="floating-toc">
        <details open>
            <summary>Daftar Isi</summary>
            <div>
                {{- .TableOfContents -}}
            </div>
        </details>
    </div>

    <script>
        // Highlight active section while scrolling
        window.addEventListener('DOMContentLoaded', () => {
            const tocLinks = document.querySelectorAll('.floating-toc a');
            const headers = document.querySelectorAll('h1, h2, h3, h4');

            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.forEach(link => link.classList.remove('active'));
                        const id = entry.target.getAttribute('id');
                        const activeLink = document.querySelector(`.floating-toc a[href="#${id}"]`);
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, { rootMargin: '0px 0px -80% 0px' });

            headers.forEach(header => {
                if (header.id) observer.observe(header);
            });
        });
    </script>
    {{- end -}}
