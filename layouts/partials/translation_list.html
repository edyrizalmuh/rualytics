{{- $translations := .Translations }}
{{- with $translations }}
<ul class="not-prose" id="translations">
    {{- range . }}
    <li>
        <a href="{{ .Permalink }}">
            {{ .Language.LanguageName }}
        </a>
    </li>
    {{- end }}
</ul>
{{- else }}
<!-- DEBUG: no translations found -->
<p style="color:red">No translations found for this page</p>
{{- end }}
