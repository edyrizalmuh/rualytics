baseURL: "https://rualytics.com/"
title: "Rualytics"
theme: "PaperMod"
paginate: 10
googleAnalytics: "G-S33YNJ8FC0"

# Bilingual setup
defaultContentLanguage: "id"
defaultContentLanguageInSubdir: true

languages:
  id:
    languageName: "Bahasa Indonesia"
    weight: 1
    title: "Rualytics"
    contentDir: "content/id"
    params:
      description: "Statistika dan Sains Data"
  en:
    languageName: "English"
    weight: 2
    title: "Rualytics"
    contentDir: "content/en"
    params:
      description: "Statistics and Data Science"

# Site parameters
params:
  author: "Muhammad Edy Rizal"
  defaultTheme: auto # light/dark/auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true # important for code blocks
  math: true # enables MathJax
  ShowToc: true
  TocOpen: true
#  UseHugoToc: true

# Enable these output formats (needed for sitemap + RSS)
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Sitemap settings (important for SEO)
sitemap:
  changefreq: weekly
  priority: 0.5

# Markdown settings
markup:
  highlight:
    style: monokai # code block color theme
    lineNos: true # show line numbers
  goldmark:
    renderer:
      unsafe: true # allows HTML in markdown


# canonifyURLs: true
